services:
  - type: web
    name: ai4community-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health

  - type: web
    name: civiq-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: "cd frontend/nextapp && npm install && npm run build"
    startCommand: "cd frontend/nextapp && npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ai4community-backend
          envVarKey: RENDER_EXTERNAL_URL
